<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>gacha de vob eu to ficando maluco</title>
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        #bongy-container {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
        }

        #bongy-img {
            width: 150px; 
            cursor: pointer;
            display: block;

            transition: transform 0.1s; 
        }

        .bongy-jump {
            animation: bongyJump 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bongyJump {
            0% { transform: scale(1, 1) translateY(0); }
            30% { transform: scale(1.2, 0.8) translateY(0); }
            60% { transform: scale(0.9, 1.1) translateY(-40px); }
            100% { transform: scale(1, 1) translateY(0); }
        }
    </style>
</head>

<body class="banner">

    <div id="lunacyBar">
        <img src="img/Lunacy.webp" id="lunacyIcon" onerror="this.style.display='none'">
        <span id="lunacyText">0</span>

        <button id="extract1Btn">Extrair 1 (130)</button>
        <button id="extract10Btn">Extrair 10 (1300)</button>
    </div>

        <img src="img/bongy.webp" id="bongy-img" alt="Bongy" onclick="bongyFarm()">

</body>
