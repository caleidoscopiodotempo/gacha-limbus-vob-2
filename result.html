<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jiheisen Co. - Extração</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        #gacha-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #descricaoBox {
            position: absolute;
            top: 10%;
            width: 80%;
            max-width: 700px;
            min-height: 80px;
            padding: 20px;
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid #333;
            text-align: center;
            font-style: italic;
            font-size: 1.2rem;
            transition: opacity 0.5s, border-color 0.5s;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .spiral-container {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb {
            position: absolute;
            width: 70px;
            height: 70px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.4rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: transparent;
            z-index: 5;
        }

        .orb:hover { transform: scale(1.1); border-color: #666; }

        .orb.raridade-1 { background: #5D4037; border-color: #3E2723; color: #D7CCC8; box-shadow: 0 0 15px #5D4037; }
        .orb.raridade-2 { background: #B71C1C; border-color: #7F0000; color: #FFCDD2; box-shadow: 0 0 20px #B71C1C; }
        .orb.raridade-3 { background: #FFD700; border-color: #B8860B; color: #000; box-shadow: 0 0 30px #FFD700; }

        .controles {
            position: absolute;
            bottom: 5%;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        button {
            background: transparent;
            color: #aaa;
            border: 1px solid #444;
            padding: 12px 24px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.05); }

        #resultadoFinal {
            position: absolute;
            right: 2%;
            top: 20%;
            width: 250px;
            max-height: 60vh;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            font-size: 0.9rem;
            border-left: 1px solid #222;
        }

        .item-clicavel {
            padding: 6px;
            cursor: pointer;
            border-bottom: 1px solid #111;
            color: #888;
        }

        .item-clicavel:hover { color: gold; background: #111; }

    </style>
</head>
<body>

    <div id="gacha-container">
        <div id="descricaoBox" style="opacity: 0;"></div>

        <div class="spiral-container" id="orbsContainer">
            </div>

        <div class="controles">
            <button id="centerOrb">INICIAR REVELAÇÃO</button>
            <button onclick="window.location.href='index.html'">Retornar</button>
        </div>

        <div id="resultadoFinal"></div>
    </div>

    <script src="js/gacha.js"></script>

    <script>
        const resultados = JSON.parse(localStorage.getItem("pullResults")) || [];
        const container = document.getElementById("orbsContainer");
        const descricaoBox = document.getElementById("descricaoBox");
        const resFinalBox = document.getElementById("resultadoFinal");
        
        let filaDescricoes = [];
        let mostrandoDescricao = false;

        resultados.forEach((res, index) => {
            const orb = document.createElement("div");
            orb.className = "orb";
            orb.dataset.index = index;
            orb.innerText = "?";
            
            const angle = index * (Math.PI * 2 / 7);
            const radius = 80 + (index * 15); 
            
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            
            orb.style.transform = `translate(${x}px, ${y}px)`;
            
            orb.onclick = function() { abrirUma(this, res); };
            container.appendChild(orb);
        });

        function abrirUma(elemento, personagem) {
            if (elemento.classList.contains("opened")) return;
            elemento.classList.add("opened");
            
            let rotulo = "0";
            if (personagem.raridade === 1) { 
                elemento.classList.add("raridade-1"); rotulo = "0"; 
            } else if (personagem.raridade === 2) { 
                elemento.classList.add("raridade-2"); rotulo = "00"; 
            } else if (personagem.raridade === 3) { 
                elemento.classList.add("raridade-3"); rotulo = "000";
                descricaoBox.style.borderColor = "#FFD700";
            }

            elemento.innerText = rotulo;
            filaDescricoes.push(`[${personagem.nome}]: ${personagem.descricao}`);
            
            if (!mostrandoDescricao) processarProximaFrase();
            if (document.querySelectorAll(".opened").length === resultados.length) montarListaFinal();
        }

        function processarProximaFrase() {
            if (filaDescricoes.length === 0) { mostrandoDescricao = false; return; }
            mostrandoDescricao = true;
            descricaoBox.style.opacity = 0;
            setTimeout(() => {
                descricaoBox.innerText = filaDescricoes.shift();
                descricaoBox.style.opacity = 1;
                setTimeout(processarProximaFrase, 5000);
            }, 500);
        }

        document.getElementById("centerOrb").onclick = function() {
            const todas = document.querySelectorAll(".orb:not(.opened)");
            todas.forEach((orb, i) => {
                setTimeout(() => {
                    const idx = orb.dataset.index;
                    abrirUma(orb, resultados[idx]);
                }, i * 300);
            });
        };

        function montarListaFinal() {
            resFinalBox.innerHTML = "<h4 style='color:#555'>ARQUIVO DE EXTRAÇÃO</h4>";
            resultados.forEach(res => {
                const p = document.createElement("p");
                p.className = "item-clicavel";
                let pref = res.raridade === 3 ? "000" : (res.raridade === 2 ? "00" : "0" );
                p.innerText = `${pref} | ${res.nome}`;
                p.onclick = () => {
                    descricaoBox.innerText = `[${res.nome}]: ${res.descricao}`;
                    descricaoBox.style.opacity = 1;
                };
                resFinalBox.appendChild(p);
            });
        }
    </script>
</body>
</html>
