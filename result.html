<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>gacha pulls</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #gacha-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #descricaoBox {
            position: absolute;
            top: 50px;
            width: 80%;
            max-width: 600px;
            text-align: center;
            transition: opacity 0.5s;
            z-index: 20;
        }

        #id-nome {
            font-weight: bold;
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #id-texto {
            font-style: italic;
            font-size: 1.1rem;
            color: #bbb;
            display: block;
            line-height: 1.4;
        }

        .circle-container {
            position: relative;
            width: 450px;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-trigger {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #333 0%, #111 100%);
            border: 2px dashed #555;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 15;
            transition: 0.3s;
            color: #666;
            font-size: 0.8rem;
            text-align: center;
            padding: 10px;
        }

        .center-trigger:hover {
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .orb {
            position: absolute;
            width: 75px;
            height: 75px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.4rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            color: transparent;
            z-index: 10;
        }

        .orb.raridade-1 { background: #5D4037; border-color: #3E2723; color: #D7CCC8; box-shadow: 0 0 15px #5D4037; }
        .orb.raridade-2 { background: #B71C1C; border-color: #7F0000; color: #FFCDD2; box-shadow: 0 0 20px #B71C1C; }
        .orb.raridade-3 { background: #FFD700; border-color: #B8860B; color: #000; box-shadow: 0 0 30px #FFD700; }

        .controles-inferiores {
            position: absolute;
            bottom: 40px;
        }

        button.nav-btn {
            background: none;
            border: 1px solid #444;
            color: #666;
            padding: 10px 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        button.nav-btn:hover { color: #fff; border-color: #fff; }

        #resultadoFinal {
            position: absolute;
            right: 30px;
            top: 100px;
            width: 220px;
            max-height: 70vh;
            overflow-y: auto;
            font-size: 0.85rem;
            opacity: 0.6;
        }

        .item-clicavel {
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #222;
        }

        .item-clicavel:hover { color: gold; background: #111; }

        #special-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(255,215,0,0.2) 0%, rgba(0,0,0,0.95) 100%);
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            transition: opacity 0.5s ease;
            animation: fadeInGold 0.8s ease-out;
        }

        @keyframes fadeInGold {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #overlay-nome {
            font-size: 3rem;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        #overlay-texto {
            font-size: 1.5rem;
            color: #fff;
            max-width: 800px;
            font-style: italic;
            line-height: 1.6;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div id="special-overlay">
        <div id="overlay-nome"></div>
        <div id="overlay-texto"></div>
    </div>

    <div id="gacha-container">
        <div id="descricaoBox" style="opacity: 0;">
            <span id="id-nome"></span>
            <span id="id-texto"></span>
        </div>

        <div class="circle-container">
            <div class="center-trigger" id="centerOrb">(revelar correntes)</div>
            <div id="orbsWrapper"></div>
        </div>

        <div id="resultadoFinal"></div>

        <div class="controles-inferiores">
            <button class="nav-btn" onclick="window.location.href='index.html'">voltar</button>
        </div>
    </div>

    <script src="js/gacha.js"></script>

    <script>
        const resultados = JSON.parse(localStorage.getItem("pullResults")) || [];
        const wrapper = document.getElementById("orbsWrapper");
        const descricaoBox = document.getElementById("descricaoBox");
        const nomeIdTxt = document.getElementById("id-nome");
        const corpoTextoTxt = document.getElementById("id-texto");
        const resFinalBox = document.getElementById("resultadoFinal");
        
        let filaResultados = [];
        let mostrandoDescricao = false;

        const totalOrbs = resultados.length;
        const radius = 180; 

        resultados.forEach((res, index) => {
            const orb = document.createElement("div");
            orb.className = "orb";
            orb.dataset.index = index;
            orb.innerText = "?";
            
            const angle = (index / totalOrbs) * (Math.PI * 2);
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            
            orb.style.left = `calc(50% + ${x}px - 37.5px)`;
            orb.style.top = `calc(50% + ${y}px - 37.5px)`;
            
            orb.onclick = function() { abrirUma(this, res); };
            wrapper.appendChild(orb);
        });

        function abrirUma(elemento, personagem) {
            if (elemento.classList.contains("opened")) return;
            elemento.classList.add("opened");
            
            let rotulo = personagem.raridade === 3 ? "000" : (personagem.raridade === 2 ? "00" : "0");
            let classe = personagem.raridade === 3 ? "raridade-3" : (personagem.raridade === 2 ? "raridade-2" : "raridade-1");
            
            elemento.classList.add(classe);
            elemento.innerText = rotulo;

            if (personagem.raridade === 3) {
                exibirDestaqueDourado(personagem);
            } else {
                filaResultados.push(personagem);
                if (!mostrandoDescricao) processarProximaFrase();
            }

            if (document.querySelectorAll(".opened").length === resultados.length) montarListaFinal();
        }

        function exibirDestaqueDourado(p) {
            const overlay = document.getElementById("special-overlay");
            const oNome = document.getElementById("overlay-nome");
            const oTexto = document.getElementById("overlay-texto");

            oNome.innerText = p.nome;
            oTexto.innerText = p.descricao;
            overlay.style.display = "flex";
            overlay.style.opacity = "1";

            setTimeout(() => {
                overlay.style.opacity = "0";
                setTimeout(() => {
                    overlay.style.display = "none";
                    filaResultados.push(p);
                    if (!mostrandoDescricao) processarProximaFrase();
                }, 500);
            }, 4000); 
        }

        function processarProximaFrase() {
            if (filaResultados.length === 0) {
                mostrandoDescricao = false;
                return;
            }

            mostrandoDescricao = true;
            descricaoBox.style.opacity = 0;

            setTimeout(() => {
                const p = filaResultados.shift();
                nomeIdTxt.innerText = p.nome;
                corpoTextoTxt.innerText = p.descricao;
                descricaoBox.style.opacity = 1;
                
                setTimeout(processarProximaFrase, 5000);
            }, 500);
        }

        document.getElementById("centerOrb").onclick = function() {
            const todas = document.querySelectorAll(".orb:not(.opened)");
            this.style.display = "none"; 
            
            todas.forEach((orb, i) => {
                setTimeout(() => {
                    const idx = orb.dataset.index;
                    abrirUma(orb, resultados[idx]);
                }, i * 250);
            });
        };

        function montarListaFinal() {
            resFinalBox.innerHTML = "<h4 style='border-bottom:1px solid #333'>LOG DE EXTRAÇÃO</h4>";
            resultados.forEach(res => {
                const p = document.createElement("p");
                p.className = "item-clicavel";
                let pref = res.raridade === 3 ? "000" : (res.raridade === 2 ? "00" : "0" );
                p.innerText = `${pref} | ${res.nome}`;
                p.onclick = () => {
                    nomeIdTxt.innerText = res.nome;
                    corpoTextoTxt.innerText = res.descricao;
                    descricaoBox.style.opacity = 1;
                };
                resFinalBox.appendChild(p);
            });
        }
    </script>
</body>
</html>
