<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jiheisen Co. - Extração</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #resultadoFinal p {
            cursor: pointer;
            transition: 0.2s;
            margin: 8px 0;
            padding: 5px;
            border-radius: 4px;
        }
        #resultadoFinal p:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffcc00; 
        }
        .opened {
            filter: grayscale(100%);
            opacity: 0.7;
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div id="gacha-container">
        <div id="descricaoBox" class="fade">Bem-vindo, Gerente. Clique nas orbes para revelar as IDs.</div>

        <div id="orbsContainer"></div>

        <button id="centerOrb">REVELAR TUDO</button>

        <div id="resultadoFinal"></div>

        <button onclick="window.location.href='index.html'">Voltar ao Painel</button>
    </div>

    <script src="js/gacha.js"></script>
    <script>
        let resultados = JSON.parse(localStorage.getItem("pullResults")) || [];
        const container = document.getElementById("orbsContainer");
        const descricaoBox = document.getElementById("descricaoBox");
        const resFinalBox = document.getElementById("resultadoFinal");
        
        let filaDescricoes = [];
        let mostrandoDescricao = false;

        resultados.forEach((res, index) => {
            const orb = document.createElement("div");
            orb.className = "orb";
            orb.dataset.index = index;
            orb.innerText = "?"; 
            
            orb.onclick = () => revelarOrb(orb, res);
            container.appendChild(orb);
        });

        function revelarOrb(orb, res) {
            if (orb.classList.contains("opened")) return;

            orb.classList.add("opened");
            orb.innerText = res.raridade + "★"; 
            
            filaDescricoes.push(`${res.nome}: "${res.descricao}"`);
            
            if (!mostrandoDescricao) {
                processarFila();
            }

            const abertas = document.querySelectorAll(".opened").length;
            if (abertas === resultados.length) {
                setTimeout(mostrarResultadosFinais, 1000);
            }
        }

        function processarFila() {
            if (filaDescricoes.length === 0) {
                mostrandoDescricao = false;
                return;
            }

            mostrandoDescricao = true;
            const texto = filaDescricoes.shift();

            // Efeito de Fade Out e In
            descricaoBox.style.opacity = 0;
            
            setTimeout(() => {
                descricaoBox.innerText = texto;
                descricaoBox.style.opacity = 1;
                
                setTimeout(processarFila, 5000); 
            }, 500);
        }

        document.getElementById("centerOrb").onclick = () => {
            const orbesNaoAbertas = document.querySelectorAll(".orb:not(.opened)");
            orbesNaoAbertas.forEach((orb, i) => {
                setTimeout(() => {
                    const idx = orb.dataset.index;
                    revelarOrb(orb, resultados[idx]);
                }, i * 300); 
            });
        };

        function mostrarResultadosFinais() {
            resFinalBox.innerHTML = "<h3>Histórico da Extração (Clique para reler):</h3>";
            resFinalBox.style.display = "block";

            resultados.forEach(res => {
                const p = document.createElement("p");
                p.innerText = `[${res.raridade}★] ${res.nome}`;
                
                p.onclick = () => {
                    descricaoBox.innerText = `${res.nome}: "${res.descricao}"`;
                    descricaoBox.style.opacity = 1;
                };

                resFinalBox.appendChild(p);
            });
        }
    </script>
</body>
</html>
