<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>gacha results !!</title>
    <link rel="stylesheet" href="style.css">
    
    <style>

        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #gacha-container {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        #descricaoBox {
            min-height: 60px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(30, 30, 30, 0.9);
            border-left: 4px solid #ffcc00;
            font-style: italic;
            font-size: 1.1rem;
            transition: opacity 0.5s;
        }

        .orbs-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .orb {
            aspect-ratio: 1 / 1;
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .orb:hover { border-color: #888; transform: scale(1.05); }
        .orb.opened { background: #000; border-color: #ffcc00; color: #ffcc00; box-shadow: 0 0 10px #ffcc00; }

        button {
            background: #1a1a1a;
            color: white;
            border: 1px solid #ffcc00;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { background: #ffcc00; color: black; }

        #resultadoFinal {
            margin-top: 20px;
            text-align: left;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .item-clicavel {
            padding: 5px;
            cursor: pointer;
            color: #aaa;
            border-bottom: 1px solid #222;
        }

        .item-clicavel:hover { color: white; background: #222; }
    </style>
</head>
<body>

    <div id="gacha-container">
        <div id="descricaoBox" style="opacity: 0;"></div>

        <div class="orbs-grid" id="orbsContainer"></div>

        <button id="centerOrb">REVELAR TUDO</button>

        <div id="resultadoFinal"></div>

        <button onclick="window.location.href='index.html'">Voltar ao Painel</button>
    </div>

    <script src="js/gacha.js"></script>

    <script>
        const resultados = JSON.parse(localStorage.getItem("pullResults")) || [];
        const container = document.getElementById("orbsContainer");
        const descricaoBox = document.getElementById("descricaoBox");
        const resFinalBox = document.getElementById("resultadoFinal");
        
        let filaDescricoes = [];
        let mostrandoDescricao = false;

        resultados.forEach((res, index) => {
            const orb = document.createElement("div");
            orb.className = "orb";
            orb.dataset.index = index;
            orb.innerText = "?";
            orb.onclick = function() { abrirUma(this, res); };
            container.appendChild(orb);
        });

        function abrirUma(elemento, personagem) {
            if (elemento.classList.contains("opened")) return;

            elemento.classList.add("opened");
            elemento.innerText = personagem.raridade + "★";
            
            filaDescricoes.push(`[${personagem.nome}]: ${personagem.descricao}`);
            
            if (!mostrandoDescricao) {
                processarProximaFrase();
            }

            if (document.querySelectorAll(".opened").length === resultados.length) {
                montarListaFinal();
            }
        }

        function processarProximaFrase() {
            if (filaDescricoes.length === 0) {
                mostrandoDescricao = false;
                return;
            }

            mostrandoDescricao = true;
            descricaoBox.style.opacity = 0;

            setTimeout(() => {
                descricaoBox.innerText = filaDescricoes.shift();
                descricaoBox.style.opacity = 1;
                
                setTimeout(processarProximaFrase, 5000);
            }, 500);
        }

        document.getElementById("centerOrb").onclick = function() {
            const todas = document.querySelectorAll(".orb:not(.opened)");
            todas.forEach((orb, i) => {
                setTimeout(() => {
                    const idx = orb.dataset.index;
                    abrirUma(orb, resultados[idx]);
                }, i * 200);
            });
        };

        function montarListaFinal() {
            resFinalBox.innerHTML = "<h3>Histórico (Clique para reler):</h3>";
            resultados.forEach(res => {
                const p = document.createElement("p");
                p.className = "item-clicavel";
                p.innerText = `${res.nome}`;
                p.onclick = () => {
                    descricaoBox.innerText = `[${res.nome}]: ${res.descricao}`;
                    descricaoBox.style.opacity = 1;
                };
                resFinalBox.appendChild(p);
            });
        }
    </script>
</body>
</html>
