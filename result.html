<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jiheisen Co. - Extração</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #gacha-container {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        #descricaoBox {
            min-height: 60px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(20, 20, 20, 0.9);
            border-left: 4px solid #444;
            font-style: italic;
            font-size: 1.1rem;
            transition: opacity 0.5s;
            border-radius: 0 8px 8px 0;
        }

        .orbs-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .orb {
            aspect-ratio: 1 / 1;
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.4rem;
            transition: all 0.3s;
            color: transparent; 
        }

        .orb:hover { border-color: #888; transform: scale(1.05); }

        .orb.raridade-1 { background: #5D4037; border-color: #3E2723; color: #D7CCC8; box-shadow: 0 0 10px rgba(93, 64, 55, 0.5); } 
        .orb.raridade-2 { background: #B71C1C; border-color: #7F0000; color: #FFCDD2; box-shadow: 0 0 15px rgba(183, 28, 28, 0.6); }
        .orb.raridade-3 { background: #FFD700; border-color: #B8860B; color: #000000; box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); } 

        .orb.opened { opacity: 1; }

        button {
            background: #1a1a1a;
            color: white;
            border: 1px solid #444;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        button:hover { background: #ffffff; color: black; border-color: #ffffff; }

        #resultadoFinal {
            margin-top: 20px;
            text-align: left;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .item-clicavel {
            padding: 8px;
            cursor: pointer;
            color: #aaa;
            border-bottom: 1px solid #222;
            transition: 0.2s;
        }

        .item-clicavel:hover { color: white; background: #1a1a1a; padding-left: 15px; }
    </style>
</head>
<body>

    <div id="gacha-container">
        <div id="descricaoBox" style="opacity: 0;"></div>

        <div class="orbs-grid" id="orbsContainer"></div>

        <div class="controles">
            <button id="centerOrb">REVELAR TUDO</button>
            <button onclick="window.location.href='index.html'">Voltar ao Painel</button>
        </div>

        <div id="resultadoFinal"></div>
    </div>

    <script src="js/gacha.js"></script>

    <script>
        const resultados = JSON.parse(localStorage.getItem("pullResults")) || [];
        const container = document.getElementById("orbsContainer");
        const descricaoBox = document.getElementById("descricaoBox");
        const resFinalBox = document.getElementById("resultadoFinal");
        
        let filaDescricoes = [];
        let mostrandoDescricao = false;

        resultados.forEach((res, index) => {
            const orb = document.createElement("div");
            orb.className = "orb";
            orb.dataset.index = index;
            orb.innerText = "?";
            orb.onclick = function() { abrirUma(this, res); };
            container.appendChild(orb);
        });

        function abrirUma(elemento, personagem) {
            if (elemento.classList.contains("opened")) return;

            elemento.classList.add("opened");
            
            let rotuloRaridade = "";
            if (personagem.raridade === 1) {
                rotuloRaridade = "0";
                elemento.classList.add("raridade-1");
            } else if (personagem.raridade === 2) {
                rotuloRaridade = "00";
                elemento.classList.add("raridade-2");
            } else if (personagem.raridade === 3) {
                rotuloRaridade = "000";
                elemento.classList.add("raridade-3");

                descricaoBox.style.borderColor = "#FFD700";
            }

            elemento.innerText = rotuloRaridade;
            
            filaDescricoes.push(`[${personagem.nome}]: ${personagem.descricao}`);
            
            if (!mostrandoDescricao) {
                processarProximaFrase();
            }

            if (document.querySelectorAll(".opened").length === resultados.length) {
                montarListaFinal();
            }
        }

        function processarProximaFrase() {
            if (filaDescricoes.length === 0) {
                mostrandoDescricao = false;
                return;
            }

            mostrandoDescricao = true;
            descricaoBox.style.opacity = 0;

            setTimeout(() => {
                descricaoBox.innerText = filaDescricoes.shift();
                descricaoBox.style.opacity = 1;
                
                setTimeout(processarProximaFrase, 5000);
            }, 500);
        }

        document.getElementById("centerOrb").onclick = function() {
            const todas = document.querySelectorAll(".orb:not(.opened)");
            todas.forEach((orb, i) => {
                setTimeout(() => {
                    const idx = orb.dataset.index;
                    abrirUma(orb, resultados[idx]);
                }, i * 250);
            });
        };

        function montarListaFinal() {
            resFinalBox.innerHTML = "<h3>Dossiê de Extração (Clique para reler):</h3>";
            resultados.forEach(res => {
                const p = document.createElement("p");
                p.className = "item-clicavel";
                
                let prefixo = res.raridade === 1 ? "0" : (res.raridade === 2 ? "00" : "000");
                p.innerText = `${prefixo} | ${res.nome}`;
                
                p.onclick = () => {
                    descricaoBox.innerText = `[${res.nome}]: ${res.descricao}`;
                    descricaoBox.style.opacity = 1;

                    descricaoBox.style.borderColor = res.raridade === 3 ? "#FFD700" : (res.raridade === 2 ? "#B71C1C" : "#444");
                };
                resFinalBox.appendChild(p);
            });
        }
    </script>
</body>
</html>
