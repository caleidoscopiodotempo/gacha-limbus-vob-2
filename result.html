<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>pulls do gacha ;p</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #gacha-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #descricaoBox {
            position: absolute;
            top: 50px;
            width: 80%;
            max-width: 600px;
            text-align: center;
            transition: opacity 0.5s;
            z-index: 20;
        }

        #id-nome {
            font-weight: bold;
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #id-texto {
            font-style: italic;
            font-size: 1.1rem;
            color: #bbb;
            display: block;
            line-height: 1.4;
        }

        .circle-container {
            position: relative;
            width: 450px;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-trigger {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #333 0%, #111 100%);
            border: 2px dashed #555;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 15;
            transition: 0.3s;
            color: #666;
            text-align: center;
        }

        .orb {
            position: absolute;
            width: 75px;
            height: 75px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.4rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            color: transparent;
            z-index: 10;
        }

        .orb.raridade-1 { background: #5D4037; border-color: #3E2723; color: #D7CCC8; box-shadow: 0 0 15px #5D4037; }
        .orb.raridade-2 { background: #B71C1C; border-color: #7F0000; color: #FFCDD2; box-shadow: 0 0 20px #B71C1C; }
        .orb.raridade-3 { background: #FFD700; border-color: #B8860B; color: #000; box-shadow: 0 0 30px #FFD700; }

        #special-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.98);
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000; 
            text-align: center;
            cursor: pointer;
        }

        .overlay-r1 { border-top: 4px solid #5d4037; box-shadow: inset 0 0 100px rgba(93, 64, 55, 0.3); }
        .overlay-r2 { border-top: 4px solid #b71c1c; box-shadow: inset 0 0 100px rgba(183, 28, 28, 0.6); }
        .overlay-r3 { border-top: 4px solid #ffd700; box-shadow: inset 0 0 100px rgba(255, 215, 0, 0.5); }

        #final-screen-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.98);
            display: none; 
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            z-index: 2000;
            overflow-y: auto;
        }

        .results-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 700px;
            margin-top: 20px;
        }

        .id-card {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-left: 6px solid;
            background: #111;
            font-family: monospace;
            opacity: 0;
            animation: slideIn 0.4s ease forwards;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .id-card:hover { transform: scale(1.02); background: #1a1a1a; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .card-r1 { border-color: #5d4037; color: #888; }
        .card-r2 { border-color: #b71c1c; color: #ffcdd2; background: linear-gradient(90deg, #300 0%, #111 100%); }
        .card-r3 { border-color: #ffd700; color: #fff; background: linear-gradient(90deg, #430 0%, #111 100%); }

        .card-rarity-label { font-weight: bold; margin-right: 20px; width: 40px; }

        #btn-fechar-final {
            margin: 30px 0 60px 0;
            padding: 15px 40px;
            background: none;
            border: 1px solid #444;
            color: #888;
            cursor: pointer;
            text-transform: uppercase;
        }
        #btn-fechar-final:hover { border-color: #fff; color: #fff; }
    </style>
</head>
<body>

    <div id="special-overlay">
        <div id="overlay-nome" style="font-size: 3rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 3px;"></div>
        <div id="overlay-texto" style="font-size: 1.4rem; font-style: italic; max-width: 700px; padding: 0 20px; line-height: 1.6; color: #ddd;"></div>
    </div>

    <div id="final-screen-overlay">
        <h2 style="letter-spacing: 5px; color: #555;">RECOVERY COMPLETE</h2>
        <div class="results-grid" id="final-grid"></div>
        <button id="btn-fechar-final" onclick="window.location.href='index.html'">Finalizar</button>
    </div>

    <div id="gacha-container">
        <div id="descricaoBox" style="opacity: 0;">
            <span id="id-nome"></span>
            <span id="id-texto"></span>
        </div>

        <div class="circle-container">
            <div class="center-trigger" id="centerOrb">(correntes)</div>
            <div id="orbsWrapper"></div>
        </div>
    </div>

    <script>
const resultados = JSON.parse(localStorage.getItem("pullResults")) || [];
const wrapper = document.getElementById("orbsWrapper");
const descricaoBox = document.getElementById("descricaoBox");
const nomeIdTxt = document.getElementById("id-nome");
const corpoTextoTxt = document.getElementById("id-texto");

let filaDestaques = []; 
let filaDescricoesSimples = [];
let exibindoDestaqueNoMomento = false;
let mostrandoDescricaoSimples = false;
let timeoutDestaque;

resultados.forEach((res, index) => {
    const orb = document.createElement("div");
    orb.className = "orb";
    orb.dataset.index = index;
    orb.innerText = "?";
    
    const angle = (index / resultados.length) * (Math.PI * 2);
    const radius = 180;
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;
    
    orb.style.left = `calc(50% + ${x}px - 37.5px)`;
    orb.style.top = `calc(50% + ${y}px - 37.5px)`;
    
    orb.onclick = function() { abrirUma(this, res); };
    wrapper.appendChild(orb);
});

function abrirUma(elemento, personagem) {
    if (elemento.classList.contains("opened")) return;
    elemento.classList.add("opened");
    
    let rotulo = personagem.raridade === 3 ? "000" : (personagem.raridade === 2 ? "00" : "0");
    elemento.classList.add(`raridade-${personagem.raridade}`);
    elemento.innerText = rotulo;

    if (personagem.raridade >= 2) {

        filaDestaques.push(personagem);
        processarFilaDestaques();
    } else {
        filaDescricoesSimples.push(personagem);
        if (!mostrandoDescricaoSimples && !exibindoDestaqueNoMomento) processarProximaFraseSimples();
    }

    if (document.querySelectorAll(".opened").length === resultados.length) {

        verificarFimDeGacha();
    }
}

function processarFilaDestaques() {
    if (exibindoDestaqueNoMomento || filaDestaques.length === 0) return;

    exibindoDestaqueNoMomento = true;
    const p = filaDestaques.shift();
    
    const overlay = document.getElementById("special-overlay");
    const oNome = document.getElementById("overlay-nome");
    const oTexto = document.getElementById("overlay-texto");

    overlay.className = ""; 
    let rColor = p.raridade === 3 ? "gold" : "#ff4444";
    overlay.classList.add(p.raridade === 3 ? "overlay-r3" : "overlay-r2");

    oNome.innerText = p.nome;
    oNome.style.color = rColor;
    oTexto.innerText = p.descricao;
    overlay.style.display = "flex";

    const fechar = () => {
        clearTimeout(timeoutDestaque);
        overlay.style.display = "none";
        exibindoDestaqueNoMomento = false;
        
        setTimeout(() => {
            processarFilaDestaques();
            if (filaDestaques.length === 0) verificarFimDeGacha();
        }, 500);
    };

    overlay.onclick = fechar;

    let tempo = p.raridade === 3 ? 15000 : 10000;
    timeoutDestaque = setTimeout(fechar, tempo);
}

function processarProximaFraseSimples() {
    if (filaDescricoesSimples.length === 0 || exibindoDestaqueNoMomento) {
        mostrandoDescricaoSimples = false;
        return;
    }
    mostrandoDescricaoSimples = true;
    const p = filaDescricoesSimples.shift();
    
    descricaoBox.style.opacity = 0;
    setTimeout(() => {
        nomeIdTxt.innerText = p.nome;
        corpoTextoTxt.innerText = p.descricao;
        descricaoBox.style.opacity = 1;
        setTimeout(processarProximaFraseSimples, 8000); 
    }, 500);
}

function verificarFimDeGacha() {
    if (document.querySelectorAll(".opened").length === resultados.length && 
        filaDestaques.length === 0 && !exibindoDestaqueNoMomento) {
        setTimeout(montarListaFinal, 2000);
    }
}

function montarListaFinal() {
    const finalOverlay = document.getElementById("final-screen-overlay");
    const grid = document.getElementById("final-grid");
    grid.innerHTML = "";

    resultados.forEach((res, i) => {
        const card = document.createElement("div");
        let rClass = res.raridade === 3 ? "card-r3" : (res.raridade === 2 ? "card-r2" : "card-r1");
        let rLabel = res.raridade === 3 ? "000" : (res.raridade === 2 ? "00" : "0");

        card.className = `id-card ${rClass}`;
        card.style.animationDelay = `${i * 0.1}s`;
        card.innerHTML = `<span class="card-rarity-label">${rLabel}</span><span>${res.nome}</span>`;
        
        card.onclick = () => {
            filaDestaques.push(res);
            processarFilaDestaques();
        };

        grid.appendChild(card);
    });
    finalOverlay.style.display = "flex";
}

document.getElementById("centerOrb").onclick = function() {
    this.style.display = "none";
    const todas = document.querySelectorAll(".orb:not(.opened)");
    todas.forEach((orb, i) => {
        setTimeout(() => {
            const idx = orb.dataset.index;
            abrirUma(orb, resultados[idx]);
        }, i * 300);
    }); 
};
    </script>
</body>
</html>
