<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Resultados</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="result">

<div class="circle-container" id="container"></div>

<div id="centerOrb">REVELAR TODOS</div>

<div id="descricaoBox"></div>

<div id="filtro">
    <button id="filtroTodos">Todos</button>
    <button id="filtroRaros">Raros ★★★</button>
    <button id="filtroComuns">Comuns ★★</button>
    <button id="filtroLixo">Lixo ★</button>
</div>

<script src="js/gacha.js"></script>

<script>
let resultados = JSON.parse(localStorage.getItem("pullResults")) || gerarPull(10);
resultados = resultados.filter(res => res);

const container = document.getElementById("container");
const descricaoBox = document.getElementById("descricaoBox");
const descricoesMostradas = new Set();
const historico = [];

// função para criar orb sem revelar
function criarOrb(res, index) {
    const orb = document.createElement("div");
    orb.classList.add("orb");
    orb.dataset.index = index;
    orb.style.left = "50%";
    orb.style.top = "50%";
    orb.style.transform = "translate(-50%, -50%)";
    container.appendChild(orb);
}

// cria todas as orbs inicialmente
resultados.forEach((res, i) => criarOrb(res, i));

// mostrar resultados um por um
function revelarSequencial() {
    const orbs = document.querySelectorAll(".orb");
    let i = 0;

    function revelarProximo() {
        if (i >= orbs.length) return;
        const orb = orbs[i];
        const res = resultados[i];

        orb.innerText = "...";

        if (res.raridade === 3) {
            mostrarEventoRaro(res, () => finalizarReveal(orb, res, () => {
                historico.push(res);
                i++;
                setTimeout(revelarProximo, 300);
            }));
        } else {
            setTimeout(() => finalizarReveal(orb, res, () => {
                historico.push(res);
                i++;
                setTimeout(revelarProximo, 300);
            }), 400);
        }
    }

    revelarProximo();
}

function finalizarReveal(orb, res, callback) {
    orb.innerText = res.nome;
    if (res.raridade === 3) {
        orb.style.background = "gold";
        orb.style.color = "black";
    } else if (res.raridade === 2) {
        orb.style.background = "lightblue";
        orb.style.color = "black";
    } else {
        orb.style.background = "#555";
        orb.style.color = "white";
    }

    if (!descricoesMostradas.has(res.nome)) {
        mostrarDescricao(`${res.nome} — ${res.descricao}`);
        descricoesMostradas.add(res.nome);
    }

    setTimeout(() => {
        orb.style.transition = "opacity 0.5s";
        orb.style.opacity = 0;
        setTimeout(() => {
            orb.remove();
            if (callback) callback();
        }, 500);
    }, 500);
}

function mostrarDescricao(texto) {
    descricaoBox.innerText = texto;
    descricaoBox.classList.remove("fade");
    void descricaoBox.offsetWidth;
    descricaoBox.classList.add("fade");
}

function mostrarEventoRaro(res, callback) {
    const overlay = document.createElement("div");
    overlay.classList.add("rareOverlay");
    overlay.innerText = `${res.nome}\n\n${res.descricao}`;
    document.body.appendChild(overlay);

    setTimeout(() => {
        overlay.classList.add("fadeOut");
        setTimeout(() => {
            overlay.remove();
            if (callback) callback();
        }, 800);
    }, 1500);
}

document.getElementById("centerOrb").addEventListener("click", revelarSequencial);

document.getElementById("filtroTodos").onclick = () => atualizarFiltro(null);
document.getElementById("filtroRaros").onclick = () => atualizarFiltro(3);
document.getElementById("filtroComuns").onclick = () => atualizarFiltro(2);
document.getElementById("filtroLixo").onclick = () => atualizarFiltro(1);

function atualizarFiltro(raridade) {
    container.innerHTML = "";
    resultados.forEach((res, i) => {
        if (!raridade || res.raridade === raridade) criarOrb(res, i);
    });
}
</script>
</body>
</html>
